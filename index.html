<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Release Radar — every AI release worth knowing</title>
  <meta name="description" content="A structured, source-cited tracker of AI models, tools & apps we follow — from the big labs (Anthropic, OpenAI, Google) to the tools we use (Perplexity, Cursor, and more)." />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />

  <!-- Social share preview -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="AI Release Radar" />
  <meta property="og:description" content="Every AI release worth knowing — from the big labs to the tools we actually use. Structured, source-cited, auto-updated daily." />
  <meta property="og:url" content="https://koha1312.github.io/ai-release-radar/" />
  <meta property="og:image" content="https://koha1312.github.io/ai-release-radar/og.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="AI Release Radar" />
  <meta name="twitter:description" content="Every AI release worth knowing — labs + the tools we use. Auto-updated daily." />
  <meta name="twitter:image" content="https://koha1312.github.io/ai-release-radar/og.png" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <button id="theme-toggle" aria-label="Toggle light/dark">🌙</button>

  <header class="hero">
    <div class="hero-inner">
      <h1>🛰️ AI Release&nbsp;Radar</h1>
      <p class="tagline">Every AI release worth knowing — from the big labs to the tools we actually use. Structured, source-cited, no hype.</p>
      <p class="meta" id="meta">Loading…</p>
      <div class="hero-stats" id="hero-stats"></div>
    </div>
  </header>

  <main>
    <section class="controls">
      <input id="search" type="search" placeholder="🔍 Search releases…" autocomplete="off" />
      <div class="filter-row" id="company-filters"></div>
      <div class="filter-row" id="type-filters"></div>
      <div class="filter-row" id="access-filters"></div>
    </section>

    <section id="feed" class="feed"></section>
    <p id="empty" class="empty" hidden>No releases match your filters.</p>
  </main>

  <footer>
    <p>Built by <b>Khoa Nguyen</b>, paired with Claude 💙 · <a class="source" href="rss.xml">📡 RSS</a> · data updates via the radar pipeline</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
